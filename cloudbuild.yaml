steps:
  - name: ubuntu
    args:
      - '-c'
      - |
        cat > .env <<'EOF'
        NEXT_PUBLIC_FIREBASE_API_KEY=$_FIREBASE_API_KEY
        NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=$_FIREBASE_AUTH_DOMAIN
        NEXT_PUBLIC_FIREBASE_PROJECT_ID=$_FIREBASE_PROJECT_ID
        NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=$_FIREBASE_STORAGE_BUCKET
        NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=$_FIREBASE_MESSAGING_SENDER_ID
        NEXT_PUBLIC_FIREBASE_APP_ID=$_FIREBASE_APP_ID
        NEXT_PUBLIC_FIREBASE_VAPID_KEY=$_FIREBASE_VAPID_KEY
        EOF
    id: WriteEnv
    entrypoint: bash
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - '--no-cache'
      - '-t'
      - asia.gcr.io/$PROJECT_ID/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA
      - .
    id: Build
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - asia.gcr.io/$PROJECT_ID/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA
    id: Push
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    args:
      - run
      - services
      - update
      - $_SERVICE_NAME
      - '--platform=managed'
      - '--image=asia.gcr.io/$PROJECT_ID/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA'
      - >-
        --labels=managed-by=gcp-cloud-build-deploy-cloud-run,commit-sha=$COMMIT_SHA,gcb-build-id=$BUILD_ID,gcb-trigger-id=$_TRIGGER_ID,$_LABELS
      - '--region=$_DEPLOY_REGION'
      - '--quiet'
      - '--min-instances=0'
      # ^@^ で区切り文字を変更 (private_key 等の値にカンマが含まれても安全に扱うため)
      - '--set-env-vars=^@^FIREBASE_PROJECT_ID=$PROJECT_ID@FIREBASE_CLIENT_EMAIL=$_FIREBASE_CLIENT_EMAIL@FIREBASE_PRIVATE_KEY=$_FIREBASE_PRIVATE_KEY'
    id: Deploy
    entrypoint: gcloud
timeout: 3600s
images:
  - asia.gcr.io/$PROJECT_ID/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA
options:
  substitutionOption: ALLOW_LOOSE
  logging: CLOUD_LOGGING_ONLY
